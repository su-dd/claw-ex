# claw-ex API Server Docker Compose 配置
# 用于本地开发和生产部署

version: '3.8'

services:
  # FastAPI 后端服务
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-ex-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      # 开发模式：挂载代码实现热重载
      - .:/app
      # 持久化日志
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - claw-ex-network

  # Nginx 反向代理（可选，生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: claw-ex-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-server
    restart: unless-stopped
    networks:
      - claw-ex-network
    profiles:
      - production

networks:
  claw-ex-network:
    driver: bridge

# 使用示例：
# 开发环境：docker-compose up --build
# 生产环境：docker-compose --profile production up -d
